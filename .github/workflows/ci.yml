name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv and set up Python
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Run Ruff Check
      run: uv run ruff check src/ tests/ examples/

    - name: Run Ruff Format Check
      run: uv run ruff format --check src/ tests/ examples/

    - name: Run Mypy
      run: uv run mypy src/

    - name: Run Tests with Coverage
      run: uv run pytest --cov=src/traceval --cov-fail-under=85

  demo-action:
    # Dogfoods action.yml against the demo agent: the only CI coverage the
    # user-facing GitHub Action gets.
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Generate demo eval suite
      run: |
        pip install .
        python examples/make_traces.py
        traceval ingest examples/synthetic_traces.jsonl -o demo_traces.db
        traceval generate demo_traces.db -o demo_evals/ --include-failures

    - name: Run evals via the action (healthy agent must pass)
      uses: ./
      with:
        evals-dir: demo_evals
        target: examples.demo_agent.core:invoke_agent
        traceval-version: local

    - name: Run evals via the action (buggy agent must fail)
      id: buggy
      continue-on-error: true
      uses: ./
      env:
        BUGGY: "true"
      with:
        evals-dir: demo_evals
        target: examples.demo_agent.core:invoke_agent
        traceval-version: local

    - name: Assert buggy run failed
      run: |
        if [ "${{ steps.buggy.outcome }}" != "failure" ]; then
          echo "❌ Buggy agent unexpectedly passed the eval suite"
          exit 1
        fi
        echo "✅ Action correctly failed the job for the buggy agent"

  tag-and-release:
    needs: [test, demo-action]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv and set up Python
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Check version and build
      id: check-ver
      run: |
        VERSION=$(grep -m 1 'version =' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $NF}')
        TAG="v$VERSION"
        
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skipping release."
          echo "publish=false" >> $GITHUB_OUTPUT
        else
          echo "New version detected. Building and releasing $TAG..."
          uv build
          
          # Configure Git and push tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          
          echo "publish=true" >> $GITHUB_OUTPUT
        fi

    - name: Publish to PyPI
      if: steps.check-ver.outputs.publish == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true


